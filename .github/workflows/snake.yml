name: Generate Snake

# Controls when the action will run.
on:
  # Trigger on push to main branch (or any other branch you prefer)
  push:
    branches:
      - main
  # Also trigger every 6 hours as a cron job
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual triggering of the workflowssss
  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - uses: actions/checkout@v2

      # 2. Generate the snake gif
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: codecraft-sanju # Replace with your GitHub username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # 3. Show the status of the build
      - run: git status

      # 4. Push changes to the repository
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: true

      # 5. Deploy the generated gif to GitHub Pages
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
