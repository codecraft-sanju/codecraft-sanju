name: Generate Snake Animation

on:
  workflow_dispatch: # Allows manual trigger via GitHub Actions
  push:              # Runs when there is a new push to the repository
    branches:
      - main         # Adjust if your default branch is not `main`

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Generate the snake animation
      - name: Generate snake animation
        uses: Platane/snk@v2
        with:
          github_user_name: codecraft-sanju
          outputs: dist/snake.svg

      # Step 3: Commit and push the snake animation
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Generated snake animation [skip ci]"
          git push
