name: Generate Contribution Snake

# Define the events that trigger the workflow
on:
  # Trigger the workflow when pushing to the main branch (or any other branch)
  push:
    branches:
      - main
  # Run every 6 hours using cron
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual triggering of the workflow from GitHub's Actions tab
  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on (latest Ubuntu version)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository to work with
      - uses: actions/checkout@v2

      # Step 2: Generate the contribution snake using Platane's action
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: codecraft-sanju  # Replace with your GitHub username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Step 3: Debugging step to show the git status (optional)
      - run: git status

      # Step 4: Commit and push the generated GIF and SVG files to the repository
      - name: Push changes to repository
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main  # Ensure this is 'main' as your branch name
          force: true

      # Step 5: Deploy the generated snake files to GitHub Pages
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output  # The branch where the snake will be deployed
          build_dir: dist         # Directory containing the generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Step 6: Ensure the deployment is successful and print out the logs
      - name: Check GitHub Pages deployment status
        run: |
          echo "Deployment to GitHub Pages successful"
          curl -I https://<your-github-username>.github.io/<repo-name>/  # Replace with your repo name
