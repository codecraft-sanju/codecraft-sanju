name: Generate Contribution Snake

# Define the events that trigger the workflow
on:
  # Trigger the workflow on push to the main branch
  push:
    branches:
      - main
  # Run every 6 hours (automatic scheduling)
  schedule:
    - cron: "0 */6 * * *"
  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    # Use the latest Ubuntu runner for the job
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v2

      # Step 2: Generate the contribution snake
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: codecraft-sanju  # Replace with your GitHub username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Step 3: Show git status (optional for debugging)
      - run: git status

      # Step 4: Commit and push the generated files to the repository
      - name: Push changes to repository
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main  # Ensure it pushes to the 'main' branch
          force: true

      # Step 5: Deploy the snake files to GitHub Pages
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output  # The branch where the snake will be deployed
          build_dir: dist         # Directory containing the generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Confirm GitHub Pages deployment (optional)
      - name: Verify GitHub Pages deployment
        run: |
          echo "Deployment to GitHub Pages was successful!"
          curl -I https://<your-github-username>.github.io/<repo-name>/  # Replace with your repository's name
