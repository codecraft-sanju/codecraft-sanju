name: Generate Snake

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:  # Allow manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v2

      # Step 2: Generate the snake GIF and SVG from your GitHub contributions
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: codecraft-sanju  # Replace with your GitHub username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Step 3: Show git status (optional for debugging)
      - run: git status

      # Step 4: Push the generated files to the main branch
      - name: Push changes to repository
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Correctly use the GitHub token
          branch: main  # Push to the 'main' branch, not 'master'
          force: true

      # Step 5: Deploy the snake files to GitHub Pages (optional)
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output  # The branch where the snake will be deployed
          build_dir: dist         # Directory containing the generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Confirm the deployment was successful (optional)
      - name: Verify GitHub Pages deployment
        run: |
          echo "Deployment to GitHub Pages was successful!"
          curl -I https://codecraft-sanju.github.io/codecraft-sanju/  # Replace with your repository's name
