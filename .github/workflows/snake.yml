name: Generate Snake Animation

on:
  workflow_dispatch: # Allows manual trigger
  push:              # Runs on new pushes to specified branches
    branches:
      - main         # Change if your default branch is not `main`

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Generate the snake animation
      - name: Generate Snake Animation
        uses: Platane/snk@v2
        with:
          github_user_name: codecraft-sanju # Replace with your GitHub username
          svg_out_path: dist/snake.svg      # Specify where to output the file

      # Step 3: Push the changes to the repository
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dist/snake.svg
          git commit -m "Generated snake animation [skip ci]"
          git push
